<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Meteo Generativo 🌧️</title>
  <style>
    body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; font-family: sans-serif; background: #87CEEB; transition: background 1s ease; }
    canvas { display: block; position: absolute; top: 0; left: 0; z-index: 1; pointer-events: none; }
    #ui { position: relative; z-index: 10; padding: 20px; color: white; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }
    h1 { margin: 0 0 10px 0; font-size: 3rem; }
    .controls { display: flex; gap: 10px; margin-top: 20px; }
    button { padding: 10px 15px; border: none; border-radius: 8px; background: rgba(255,255,255,0.2); color: white; cursor: pointer; backdrop-filter: blur(5px); font-weight: bold; transition: 0.2s; }
    button:hover { background: rgba(255,255,255,0.4); }
  </style>
</head>
<body>

  <div id="ui">
    <h1 id="city">Soleggiato</h1>
    <p>Modalità Simulazione (Usa i tasti per cambiare il clima)</p>
    <div class="controls">
      <button onclick="setWeather('clear')">☀️ Sole</button>
      <button onclick="setWeather('rain')">🌧️ Pioggia</button>
      <button onclick="setWeather('snow')">❄️ Neve</button>
    </div>
  </div>

  <canvas id="weatherCanvas"></canvas>

  <script>
    const canvas = document.getElementById('weatherCanvas');
    const ctx = canvas.getContext('2d');
    let width, height;

    function resize() {
      width = canvas.width = window.innerWidth;
      height = canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    let particles = [];
    let currentWeather = 'clear'; // 'clear', 'rain', 'snow'

    function setWeather(type) {
      currentWeather = type;
      particles = [];
      const title = document.getElementById('city');
      if (type === 'clear') {
        document.body.style.background = '#87CEEB';
        title.innerText = "Soleggiato";
      } else if (type === 'rain') {
        document.body.style.background = '#4a5568';
        title.innerText = "Pioggia Battente";
        for(let i=0; i<300; i++) particles.push(createParticle());
      } else if (type === 'snow') {
        document.body.style.background = '#a0aec0';
        title.innerText = "Nevicata";
        for(let i=0; i<200; i++) particles.push(createParticle());
      }
    }

    function createParticle() {
      return {
        x: Math.random() * width,
        y: Math.random() * height - height,
        speed: currentWeather === 'rain' ? Math.random() * 10 + 10 : Math.random() * 2 + 1,
        length: currentWeather === 'rain' ? Math.random() * 20 + 10 : Math.random() * 3 + 2,
        drift: currentWeather === 'snow' ? Math.random() * 2 - 1 : 0
      };
    }

    function animate() {
      ctx.clearRect(0, 0, width, height);

      ctx.fillStyle = 'white';
      ctx.strokeStyle = 'rgba(255, 255, 255, 0.6)';
      ctx.lineWidth = 2;

      particles.forEach(p => {
        p.y += p.speed;
        p.x += p.drift;

        if (p.y > height) {
          p.y = -20;
          p.x = Math.random() * width;
        }

        if (currentWeather === 'rain') {
          ctx.beginPath();
          ctx.moveTo(p.x, p.y);
          ctx.lineTo(p.x, p.y + p.length);
          ctx.stroke();
        } else if (currentWeather === 'snow') {
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.length, 0, Math.PI * 2);
          ctx.fill();
        }
      });

      requestAnimationFrame(animate);
    }

    // Per integrare una vera API in futuro:
    // async function fetchWeather(city) {
    //   const apiKey = 'LA_TUA_API_KEY_QUI';
    //   const res = await fetch(`https://api.openweathermap.org/data/2.5/weather?q=${city}&appid=${apiKey}`);
    //   const data = await res.json();
    //   const condition = data.weather[0].main.toLowerCase(); // es. 'rain', 'snow', 'clear'
    //   setWeather(condition);
    // }

    setWeather('clear');
    animate();
  </script>
</body>
</html>
