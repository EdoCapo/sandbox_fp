<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pipi & il Gomitolo 🐱</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,400;0,700;0,800;1,400&family=Pacifico&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin:0; padding:0; }

    body, html {
      width:100%; height:100%;
      overflow:hidden;
      background:#1a0e1e;
      cursor:none;
    }

    #gameCanvas  { display:block; position:absolute; top:0; left:0; }
    #particleCanvas { position:fixed; top:0; left:0; pointer-events:none; z-index:50; }

    /* custom cursor — paw */
    #cursor {
      position:fixed;
      width:26px; height:26px;
      pointer-events:none;
      z-index:9999;
      transform:translate(-50%,-50%);
      font-size:22px;
      line-height:26px;
      text-align:center;
      transition:transform .1s;
      filter: drop-shadow(0 2px 4px rgba(0,0,0,.4));
    }
    #cursor.dragging { transform:translate(-50%,-50%) scale(1.4) rotate(-20deg); }

    /* UI */
    #ui {
      position:fixed; top:0; left:0; right:0;
      padding:22px 32px;
      display:flex; justify-content:space-between; align-items:flex-start;
      pointer-events:none; z-index:100;
    }

    #title-block h1 {
      font-family:'Pacifico', cursive;
      font-size:clamp(1.4rem, 3vw, 2.2rem);
      color:#fff;
      text-shadow: 0 2px 0 #b060c8, 0 4px 16px rgba(180,80,220,.5);
      letter-spacing:.02em;
    }
    #title-block p {
      font-family:'Nunito', sans-serif;
      font-size:.75rem;
      color:#e8b4f8;
      letter-spacing:.18em;
      text-transform:uppercase;
      margin-top:3px;
    }

    #score-block { text-align:right; }
    #score-label {
      font-family:'Nunito', sans-serif;
      font-size:.7rem;
      color:#e8b4f8;
      letter-spacing:.22em;
      text-transform:uppercase;
    }
    #score-value {
      font-family:'Pacifico', cursive;
      font-size:clamp(2rem,5vw,3rem);
      color:#fff;
      text-shadow:0 2px 0 #c070d8, 0 4px 20px rgba(200,100,240,.5);
      line-height:1;
      transition:transform .12s;
    }
    #score-value.pop { transform:scale(1.3) rotate(-5deg); color:#ffde7a; }

    /* message bubble */
    #bubble {
      position:fixed;
      top:50%; left:50%;
      transform:translate(-50%,-50%) scale(0);
      background:white;
      border-radius:24px;
      padding:20px 32px;
      font-family:'Nunito',sans-serif;
      font-size:1.4rem;
      font-weight:800;
      color:#7a30a8;
      box-shadow:0 8px 40px rgba(150,60,200,.35);
      pointer-events:none;
      z-index:200;
      white-space:nowrap;
      transition:transform .25s cubic-bezier(.34,1.56,.64,1), opacity .25s;
      opacity:0;
    }
    #bubble.show {
      transform:translate(-50%,-50%) scale(1);
      opacity:1;
    }

    #hint {
      position:fixed; bottom:28px; left:50%;
      transform:translateX(-50%);
      font-family:'Nunito',sans-serif;
      font-size:.8rem; font-style:italic;
      color:rgba(232,180,248,.55);
      letter-spacing:.12em;
      pointer-events:none; z-index:100;
      transition:opacity 1s;
    }

    /* dedication */
    #dedication {
      position:fixed; bottom:28px; right:32px;
      font-family:'Pacifico',cursive;
      font-size:1rem;
      color:rgba(232,180,248,.45);
      pointer-events:none; z-index:100;
    }
  </style>
</head>
<body>

<div id="cursor">🐾</div>
<canvas id="gameCanvas"></canvas>
<canvas id="particleCanvas"></canvas>

<div id="ui">
  <div id="title-block">
    <h1>Pipi & il Gomitolo</h1>
  </div>
  <div id="score-block">
    <div id="score-label">rimbalzi</div>
    <div id="score-value">0</div>
  </div>
</div>

<div id="bubble">😸</div>
<div id="hint">trascina il gomitolo e lancialo a Pipi!</div>

<script>
/* ══ SETUP ══ */
const canvas   = document.getElementById('gameCanvas');
const ctx      = canvas.getContext('2d');
const pCanvas  = document.getElementById('particleCanvas');
const pCtx     = pCanvas.getContext('2d');
const cursorEl = document.getElementById('cursor');
const scoreEl  = document.getElementById('score-value');
const hintEl   = document.getElementById('hint');
const bubbleEl = document.getElementById('bubble');

let W, H, floorY;
const GRAVITY  = 0.46;
const FRICTION = 0.993;
const BOUNCE   = -0.65;

let bounceCount = 0;
let hintGone    = false;
let catchCooldown = 0; 

const CATCH_MSGS = [
  '😻 Pipi l\'ha preso!', '🐾 Che zampata!', '💜 Brava Pipi!',
  '✨ Troppo forte!', '😸 Micio felice!', '🌸 Catto power!',
  '💕 Che cucciola!', '🎉 Pipi campione!'
];

function showBubble(msg) {
  bubbleEl.textContent = msg;
  bubbleEl.classList.add('show');
  setTimeout(() => bubbleEl.classList.remove('show'), 1400);
}

function addBounce() {
  bounceCount++;
  scoreEl.textContent = bounceCount;
  scoreEl.classList.remove('pop');
  void scoreEl.offsetWidth;
  scoreEl.classList.add('pop');
  setTimeout(() => scoreEl.classList.remove('pop'), 200);
}

function resize() {
  W = canvas.width  = pCanvas.width  = window.innerWidth;
  H = canvas.height = pCanvas.height = window.innerHeight;
  floorY = H - 100;
}
window.addEventListener('resize', resize);
resize();

/* ══ BACKGROUND — cozy room ══ */
// Precompute star positions
const stars = Array.from({length:28}, () => ({
  x: Math.random(), y: Math.random() * 0.45,
  r: Math.random() * 2 + 0.8,
  twinkle: Math.random() * Math.PI * 2
}));

function drawBackground(ts) {
  // Sky gradient (through window)
  const sky = ctx.createLinearGradient(0, 0, 0, H);
  sky.addColorStop(0,   '#1a0e2e');
  sky.addColorStop(0.55,'#2d1545');
  sky.addColorStop(1,   '#3d1f55');
  ctx.fillStyle = sky;
  ctx.fillRect(0, 0, W, H);

  // Starry stars (visible through window area)
  stars.forEach(s => {
    const alpha = 0.5 + 0.5 * Math.sin(ts * 0.001 + s.twinkle);
    ctx.beginPath();
    ctx.arc(s.x * W, s.y * H, s.r, 0, Math.PI*2);
    ctx.fillStyle = `rgba(255,240,255,${alpha * 0.7})`;
    ctx.fill();
  });

  // Moon
  const moonX = W * 0.82, moonY = H * 0.12;
  const moonGlow = ctx.createRadialGradient(moonX, moonY, 0, moonX, moonY, 80);
  moonGlow.addColorStop(0, 'rgba(255,240,200,0.18)');
  moonGlow.addColorStop(1, 'rgba(255,240,200,0)');
  ctx.fillStyle = moonGlow;
  ctx.fillRect(0, 0, W, H);
  ctx.beginPath();
  ctx.arc(moonX, moonY, 28, 0, Math.PI*2);
  ctx.fillStyle = '#fff8e8';
  ctx.fill();
  ctx.beginPath();
  ctx.arc(moonX + 10, moonY - 4, 24, 0, Math.PI*2);
  ctx.fillStyle = '#2d1545';
  ctx.fill();

  // ── WALL ──
  const wallH = H * 0.62;
  const wall = ctx.createLinearGradient(0, 0, 0, wallH);
  wall.addColorStop(0, '#f5e8d8');
  wall.addColorStop(1, '#e8d4bc');
  ctx.fillStyle = wall;
  ctx.fillRect(0, 0, W, wallH);

  // Wallpaper tiny hearts pattern
  ctx.fillStyle = 'rgba(220,160,180,0.12)';
  for (let xi = 0; xi < W; xi += 36) {
    for (let yi = 0; yi < wallH; yi += 36) {
      drawHeart(ctx, xi + 18, yi + 18, 5);
    }
  }

  // ── WINDOW ──
  const winW = Math.min(W * 0.28, 220);
  const winH = winW * 1.1;
  const winX = W * 0.72 - winW/2;
  const winY = H * 0.05;

  // window frame
  ctx.fillStyle = '#c89060';
  ctx.beginPath();
  ctx.roundRect(winX - 8, winY - 8, winW + 16, winH + 16, 8);
  ctx.fill();

  // sky through window
  const winSky = ctx.createLinearGradient(0, winY, 0, winY + winH);
  winSky.addColorStop(0, '#1a0e2e');
  winSky.addColorStop(1, '#3d1f55');
  ctx.fillStyle = winSky;
  ctx.beginPath();
  ctx.roundRect(winX, winY, winW, winH, 4);
  ctx.fill();

  // stars in window
  stars.slice(0,10).forEach(s => {
    const sx = winX + s.x * winW;
    const sy = winY + s.y * winH * 0.7;
    const alpha = 0.5 + 0.5 * Math.sin(ts * 0.001 + s.twinkle);
    ctx.beginPath();
    ctx.arc(sx, sy, s.r * 0.9, 0, Math.PI*2);
    ctx.fillStyle = `rgba(255,240,255,${alpha})`;
    ctx.fill();
  });

  // window cross bars
  ctx.strokeStyle = '#c89060';
  ctx.lineWidth = 7;
  ctx.beginPath();
  ctx.moveTo(winX + winW/2, winY);
  ctx.lineTo(winX + winW/2, winY + winH);
  ctx.moveTo(winX, winY + winH/2);
  ctx.lineTo(winX + winW, winY + winH/2);
  ctx.stroke();

  // curtains
  drawCurtain(ctx, winX - 8, winY - 8, winH + 20, false);
  drawCurtain(ctx, winX + winW + 8, winY - 8, winH + 20, true);

  // ── SHELF ──
  const shelfY = H * 0.37;
  const shelfX = W * 0.04;
  const shelfW = W * 0.26;
  ctx.fillStyle = '#c89060';
  ctx.beginPath();
  ctx.roundRect(shelfX, shelfY, shelfW, 12, 3);
  ctx.fill();
  ctx.fillStyle = '#a07040';
  ctx.fillRect(shelfX + 8, shelfY + 12, shelfW - 16, 6);

  // small book 1
  ctx.fillStyle = '#e07070';
  ctx.fillRect(shelfX + 18, shelfY - 44, 18, 44);
  ctx.fillStyle = '#f8a8a8';
  ctx.fillRect(shelfX + 19, shelfY - 42, 4, 40);

  // small book 2
  ctx.fillStyle = '#70a0e0';
  ctx.fillRect(shelfX + 40, shelfY - 52, 22, 52);
  ctx.fillStyle = '#a8c8f8';
  ctx.fillRect(shelfX + 41, shelfY - 50, 4, 48);

  // small book 3
  ctx.fillStyle = '#70c880';
  ctx.fillRect(shelfX + 66, shelfY - 38, 16, 38);

  // small plant pot
  ctx.fillStyle = '#c86040';
  ctx.beginPath();
  ctx.moveTo(shelfX + 100, shelfY);
  ctx.lineTo(shelfX + 88, shelfY - 28);
  ctx.lineTo(shelfX + 112, shelfY - 28);
  ctx.closePath();
  ctx.fill();
  ctx.fillStyle = '#408050';
  ctx.beginPath();
  ctx.arc(shelfX + 100, shelfY - 32, 16, 0, Math.PI*2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(shelfX + 110, shelfY - 40, 10, 0, Math.PI*2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(shelfX + 90, shelfY - 38, 10, 0, Math.PI*2);
  ctx.fill();

  // small heart frame
  ctx.fillStyle = '#f0d0e0';
  ctx.strokeStyle = '#d890b0';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.roundRect(shelfX + 138, shelfY - 42, 32, 38, 3);
  ctx.fill();
  ctx.stroke();
  // tiny heart inside
  ctx.fillStyle = '#e060a0';
  drawHeart(ctx, shelfX + 154, shelfY - 22, 8);

  // ── FLOOR ──
  const floorGrad = ctx.createLinearGradient(0, wallH, 0, H);
  floorGrad.addColorStop(0, '#d4a060');
  floorGrad.addColorStop(1, '#a07038');
  ctx.fillStyle = floorGrad;
  ctx.fillRect(0, wallH, W, H - wallH);

  // floor planks
  ctx.strokeStyle = 'rgba(120,70,20,0.18)';
  ctx.lineWidth = 1;
  for (let fx = 0; fx < W; fx += 90) {
    ctx.beginPath();
    ctx.moveTo(fx, wallH);
    ctx.lineTo(fx, H);
    ctx.stroke();
  }

  // skirting board
  ctx.fillStyle = '#e8d0a8';
  ctx.fillRect(0, wallH - 18, W, 18);
  ctx.fillStyle = '#d4b888';
  ctx.fillRect(0, wallH - 3, W, 3);

  // ── CAT BED / CUCCIA ──
  const bedX = W * 0.75;
  const bedY = floorY;
  drawCatBed(ctx, bedX, bedY);

  // ── RUG ──
  const rugX = W * 0.5 - 160;
  const rugY = floorY - 12;
  drawRug(ctx, rugX, rugY);

  // ── FOOD BOWL ──
  const bowlX = W * 0.15;
  const bowlY = floorY;
  drawBowl(ctx, bowlX, bowlY);

  // wall-floor shadow line
  ctx.fillStyle = 'rgba(100,50,0,0.15)';
  const sh = ctx.createLinearGradient(0, wallH, 0, wallH + 30);
  sh.addColorStop(0,'rgba(80,40,0,0.25)');
  sh.addColorStop(1,'rgba(80,40,0,0)');
  ctx.fillStyle = sh;
  ctx.fillRect(0, wallH - 2, W, 32);
}

/* ── Decorative helpers ── */
function drawHeart(c, x, y, size) {
  c.save();
  c.translate(x, y);
  c.beginPath();
  c.moveTo(0, size * 0.3);
  c.bezierCurveTo(-size * 1.1, -size * 0.4, -size * 1.8, size * 0.7, 0, size * 1.5);
  c.bezierCurveTo(size * 1.8, size * 0.7, size * 1.1, -size * 0.4, 0, size * 0.3);
  c.fill();
  c.restore();
}

function drawCurtain(c, x, topY, height, flipped) {
  c.save();
  if (flipped) { c.translate(x, topY); c.scale(-1,1); x = 0; topY = 0; }
  else { c.translate(x, topY); x = 0; topY = 0; }

  const w = 38;
  c.fillStyle = '#e87898';
  c.beginPath();
  c.moveTo(0, 0);
  for (let i = 0; i <= height; i += 12) {
    const sway = Math.sin(i * 0.08) * 8;
    c.lineTo(sway + (i < 12 ? 0 : -4), i);
  }
  c.lineTo(-w * 0.3, height);
  c.lineTo(-w, height * 0.3);
  c.lineTo(-w * 0.6, 0);
  c.closePath();
  c.fill();
  // polka dots
  c.fillStyle = 'rgba(255,255,255,0.25)';
  for (let dy = 12; dy < height; dy += 22) {
    for (let dx = -4; dx > -w + 4; dx -= 16) {
      c.beginPath();
      c.arc(dx, dy, 3, 0, Math.PI*2);
      c.fill();
    }
  }
  c.restore();
}

function drawCatBed(c, x, y) {
  // bed base — oval cushion
  c.save();
  c.translate(x, y);

  // bed outer rim
  c.beginPath();
  c.ellipse(0, -10, 68, 30, 0, 0, Math.PI*2);
  c.fillStyle = '#d4806a';
  c.fill();

  // bed inner cushion
  c.beginPath();
  c.ellipse(0, -8, 52, 22, 0, 0, Math.PI*2);
  c.fillStyle = '#f0a888';
  c.fill();

  // cushion highlight
  c.beginPath();
  c.ellipse(-8, -14, 20, 8, -0.3, 0, Math.PI*2);
  c.fillStyle = 'rgba(255,255,255,0.25)';
  c.fill();

  // label "Pipi"
  c.font = 'bold 12px Nunito, sans-serif';
  c.fillStyle = 'rgba(180,80,60,0.7)';
  c.textAlign = 'center';
  c.fillText('Pipi', 0, -4);

  c.restore();
}

function drawRug(c, x, y) {
  c.save();
  c.translate(x, y);
  // rug shadow
  c.fillStyle = 'rgba(0,0,0,0.12)';
  c.beginPath();
  c.ellipse(160, 8, 172, 14, 0, 0, Math.PI*2);
  c.fill();
  // main rug
  c.fillStyle = '#8050b8';
  c.beginPath();
  c.roundRect(0, -18, 320, 20, 6);
  c.fill();
  // rug border stripe
  c.fillStyle = '#e0a0f0';
  c.fillRect(8, -16, 304, 4);
  c.fillRect(8, -6,  304, 4);
  // rug pattern
  c.fillStyle = 'rgba(255,255,255,0.15)';
  for (let rx = 30; rx < 300; rx += 40) {
    drawHeart(c, rx, -10, 5);
  }
  c.restore();
}

function drawBowl(c, x, y) {
  c.save();
  c.translate(x, y);
  // bowl
  c.beginPath();
  c.arc(0, -6, 22, 0, Math.PI*2);
  c.fillStyle = '#f0e0d0';
  c.fill();
  c.beginPath();
  c.arc(0, -6, 18, 0, Math.PI*2);
  c.fillStyle = '#e0c8b0';
  c.fill();
  // food (little circles)
  c.fillStyle = '#d08050';
  [-5, 0, 5].forEach(dx => {
    [-4, 1].forEach(dy => {
      c.beginPath();
      c.arc(dx, -6 + dy, 3.5, 0, Math.PI*2);
      c.fill();
    });
  });
  // cat paw label on bowl
  c.font = '10px Arial';
  c.fillStyle = '#c08060';
  c.textAlign = 'center';
  c.fillText('🐾', 0, -2);
  c.restore();
}

/* ══ YARN BALL ══ */
const ball = {
  x:0, y:0, vx:0, vy:0,
  radius:20, isDragging:false, angle:0
};
function initBall() {
  ball.x = W/2; ball.y = floorY - ball.radius;
  ball.vx = 0; ball.vy = 0;
}
initBall();

// Yarn colors — soft lavender/pink
const YARN_COLORS = ['#d080e8','#c060d8','#9040b0'];

function drawBall() {
  const r = ball.radius;
  ctx.save();
  ctx.translate(ball.x, ball.y);
  ctx.rotate(ball.angle);

  // drop shadow
  if (!ball.isDragging) {
    const sh = ctx.createRadialGradient(0, r, 0, 0, r, r * 1.5);
    sh.addColorStop(0,'rgba(0,0,0,0.3)');
    sh.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle = sh;
    ctx.beginPath();
    ctx.ellipse(0, r * 0.7, r * 1.1, r * 0.4, 0, 0, Math.PI*2);
    ctx.fill();
  }

  // sphere base
  const g = ctx.createRadialGradient(-r*.32,-r*.32, r*.05, 0, 0, r);
  g.addColorStop(0,   '#e8a0f0');
  g.addColorStop(0.5, '#c060d8');
  g.addColorStop(1,   '#7020a0');
  ctx.beginPath();
  ctx.arc(0, 0, r, 0, Math.PI*2);
  ctx.fillStyle = g;
  ctx.fill();

  // yarn wraps
  for (let i = 0; i < 5; i++) {
    ctx.strokeStyle = `rgba(255,200,255,${0.10 + i*0.03})`;
    ctx.lineWidth = 1.8;
    const a = (i/5) * Math.PI;
    ctx.beginPath();
    ctx.ellipse(0, 0, r*.9, r*.25, a, 0, Math.PI*2);
    ctx.stroke();
  }

  // specular
  const hl = ctx.createRadialGradient(-r*.3,-r*.3, 0, -r*.3,-r*.3, r*.55);
  hl.addColorStop(0,'rgba(255,255,255,0.6)');
  hl.addColorStop(1,'rgba(255,255,255,0)');
  ctx.fillStyle = hl;
  ctx.beginPath();
  ctx.arc(0,0,r,0,Math.PI*2);
  ctx.fill();

  // dragging aura
  if (ball.isDragging) {
    ctx.shadowBlur = 28;
    ctx.shadowColor = 'rgba(200,80,255,0.6)';
    ctx.beginPath();
    ctx.arc(0,0,r+3,0,Math.PI*2);
    ctx.strokeStyle = 'rgba(220,120,255,0.5)';
    ctx.lineWidth = 2;
    ctx.stroke();
    ctx.shadowBlur = 0;
  }

  ctx.restore();
}

/* ══ BLACK CAT (Pipi) ══ */
const cat = {
  x:0, y:0, vx:0, vy:0,
  speed:5, width:60,
  isJumping:false, facingRight:true,
  state:'idle', animTimer:0,
  tailAngle:0, blinkTimer:120, isBlinking:false,
  bounceAnim:0
};
function initCat() {
  cat.x = W * 0.3; cat.y = floorY;
}
initCat();

function drawPipi(x, y, facingRight, state, tailA, blinking, bounceAnim) {
  ctx.save();
  ctx.translate(x, y);
  if (!facingRight) ctx.scale(-1,1);

  const s = 1.05;
  // cute bounce bob
  const bob = Math.sin(bounceAnim) * (state === 'run' ? 4 : 1.5);

  /* ── TAIL ── */
  ctx.save();
  ctx.strokeStyle = '#2a2a3a';
  ctx.lineWidth = 7 * s;
  ctx.lineCap = 'round';
  // fluffy tail tip
  const tx = -14*s, ty = (-14 + bob)*s;
  ctx.beginPath();
  ctx.moveTo(tx, ty);
  ctx.bezierCurveTo(
    tx - 32*s, ty + 8*s + Math.sin(tailA)*14*s,
    tx - 20*s, ty - 32*s + Math.cos(tailA*.6)*10*s,
    tx - 6*s,  ty - 44*s + Math.sin(tailA*1.2)*8*s
  );
  ctx.stroke();
  // tip fluff
  ctx.beginPath();
  ctx.arc(tx - 6*s, ty - 44*s + Math.sin(tailA*1.2)*8*s, 7*s, 0, Math.PI*2);
  ctx.fillStyle = '#3a3a4e';
  ctx.fill();
  ctx.restore();

  /* ── BODY ── */
  ctx.save();
  ctx.translate(0, bob*s);
  const bodyG = ctx.createRadialGradient(-2*s,-20*s, 2, -2*s,-20*s, 26*s);
  bodyG.addColorStop(0, '#4a4a60');
  bodyG.addColorStop(0.5,'#2a2a38');
  bodyG.addColorStop(1,  '#15151e');
  ctx.fillStyle = bodyG;
  ctx.beginPath();
  ctx.ellipse(0, -18*s, 19*s, 23*s, 0, 0, Math.PI*2);
  ctx.fill();

  // tummy patch (cute white/light belly)
  const tum = ctx.createRadialGradient(2*s,-14*s, 0, 2*s,-14*s, 10*s);
  tum.addColorStop(0,'rgba(200,200,220,0.35)');
  tum.addColorStop(1,'rgba(200,200,220,0)');
  ctx.fillStyle = tum;
  ctx.beginPath();
  ctx.ellipse(2*s,-14*s, 9*s, 12*s, 0, 0, Math.PI*2);
  ctx.fill();
  ctx.restore();

  /* ── HEAD ── */
  ctx.save();
  ctx.translate(0, bob*s);
  const headG = ctx.createRadialGradient(-3*s,-47*s, 2, -3*s,-47*s, 19*s);
  headG.addColorStop(0,'#505068');
  headG.addColorStop(0.6,'#2a2a38');
  headG.addColorStop(1,'#15151e');
  ctx.fillStyle = headG;
  ctx.beginPath();
  ctx.arc(0, -46*s, 18*s, 0, Math.PI*2);
  ctx.fill();

  /* ears */
  function ear(ex, ey, rot) {
    ctx.save();
    ctx.translate(ex, ey);
    ctx.rotate(rot);
    ctx.beginPath();
    ctx.moveTo(0,0);
    ctx.lineTo(-8*s,-18*s);
    ctx.lineTo(8*s,-18*s);
    ctx.closePath();
    ctx.fillStyle = '#1e1e28';
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(0,-3*s);
    ctx.lineTo(-4*s,-12*s);
    ctx.lineTo(4*s,-12*s);
    ctx.closePath();
    ctx.fillStyle = '#e898b8';
    ctx.fill();
    ctx.restore();
  }
  ear(-12*s, -58*s, -0.15);
  ear( 12*s, -58*s,  0.15);

  /* eyes — big cute green */
  const eyeY = -48*s;
  [-7.5, 7.5].forEach(ex => {
    ex *= s;
    // eye glow
    const eyeGlow = ctx.createRadialGradient(ex, eyeY, 0, ex, eyeY, 7*s);
    eyeGlow.addColorStop(0,'rgba(234,239,44,0.3)');
    eyeGlow.addColorStop(1,'rgba(234,239,44,0)');
    ctx.fillStyle = eyeGlow;
    ctx.beginPath();
    ctx.arc(ex, eyeY, 8*s, 0, Math.PI*2);
    ctx.fill();

    // white
    ctx.beginPath();
    ctx.arc(ex, eyeY, 5.5*s, 0, Math.PI*2);
    ctx.fillStyle = '#e8f8e0';
    ctx.fill();

    if (blinking) {
      ctx.beginPath();
      ctx.moveTo(ex - 5.5*s, eyeY);
      ctx.quadraticCurveTo(ex, eyeY - 3*s, ex + 5.5*s, eyeY);
      ctx.strokeStyle = '#1a1a24';
      ctx.lineWidth = 2*s;
      ctx.stroke();
    } else {
      // iris
      ctx.beginPath();
      ctx.arc(ex, eyeY, 4*s, 0, Math.PI*2);
      ctx.fillStyle = '#50c858';
      ctx.fill();
      // pupil slit
      ctx.beginPath();
      ctx.ellipse(ex, eyeY, 1.5*s, 3.5*s, 0, 0, Math.PI*2);
      ctx.fillStyle = '#0a0a14';
      ctx.fill();
      // shine 1
      ctx.beginPath();
      ctx.arc(ex - 1.5*s, eyeY - 1.5*s, 1.4*s, 0, Math.PI*2);
      ctx.fillStyle = 'rgba(255,255,255,0.95)';
      ctx.fill();
      // shine 2 (small)
      ctx.beginPath();
      ctx.arc(ex + 1.8*s, eyeY + 0.8*s, 0.7*s, 0, Math.PI*2);
      ctx.fillStyle = 'rgba(255,255,255,0.6)';
      ctx.fill();
    }
  });

  /* nose — tiny pink */
  ctx.beginPath();
  ctx.moveTo(0, -42*s);
  ctx.lineTo(-3*s,-39*s);
  ctx.lineTo(3*s,-39*s);
  ctx.closePath();
  ctx.fillStyle = '#e878a8';
  ctx.fill();

  /* mouth */
  ctx.beginPath();
  ctx.moveTo(-4*s,-37*s);
  ctx.quadraticCurveTo(-6.5*s,-33*s,-2*s,-35*s);
  ctx.moveTo(4*s,-37*s);
  ctx.quadraticCurveTo(6.5*s,-33*s,2*s,-35*s);
  ctx.strokeStyle = '#c060a0';
  ctx.lineWidth = 1.3*s;
  ctx.lineCap = 'round';
  ctx.stroke();

  /* whiskers */
  ctx.strokeStyle = 'rgba(200,200,220,0.65)';
  ctx.lineWidth = 0.9*s;
  [[-1,-1],[-1,0],[-1,1],[1,-1],[1,0],[1,1]].forEach(([side,row]) => {
    const wy = (-39 + row*3)*s;
    ctx.beginPath();
    ctx.moveTo(side*5*s, wy);
    ctx.lineTo(side*28*s, wy + row*2*s);
    ctx.stroke();
  });

  ctx.restore(); // head/body bob

  /* ── LEGS ── */
  ctx.save();
  ctx.translate(0, bob*s);
  const legBob = state === 'run' ? Math.sin(cat.animTimer * 0.25) * 6 : 0;
  [[-10, 1], [10, -1]].forEach(([lx, sign]) => {
    const lb = legBob * sign;
    ctx.strokeStyle = '#1e1e28';
    ctx.lineWidth = 8*s;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(lx*s, -4*s);
    ctx.lineTo(lx*s, 6*s + lb*s);
    ctx.stroke();
    // cute round paw
    ctx.beginPath();
    ctx.arc(lx*s, 8*s + lb*s, 5.5*s, 0, Math.PI*2);
    ctx.fillStyle = '#2a2a3a';
    ctx.fill();
    // toe beans
    ctx.fillStyle = '#e878b8';
    ctx.beginPath(); ctx.arc(lx*s - 3*s, 9*s + lb*s, 1.8*s, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(lx*s + 3*s, 9*s + lb*s, 1.8*s, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(lx*s, 12*s + lb*s, 1.8*s, 0, Math.PI*2); ctx.fill();
  });
  ctx.restore();

  /* ground shadow */
  ctx.fillStyle = 'rgba(0,0,0,0.18)';
  ctx.beginPath();
  ctx.ellipse(0, 6*s, 24*s, 6*s, 0, 0, Math.PI*2);
  ctx.fill();

  ctx.restore();
}

/* ══ PARTICLES ══ */
const particles = [];
function spawnParticles(x, y, count, type) {
  const hearts = ['💜','💜','✨','⭐','💫'];
  for (let i = 0; i < count; i++) {
    const a = Math.random() * Math.PI * 2;
    const sp = type === 'catch' ? Math.random()*6+3 : Math.random()*3+1;
    particles.push({
      x, y,
      vx: Math.cos(a)*sp,
      vy: Math.sin(a)*sp - (type === 'bounce' ? 2 : 4),
      life: 1,
      decay: Math.random()*.025+.018,
      size: Math.random()*5+3,
      emoji: type === 'catch' ? hearts[Math.floor(Math.random()*hearts.length)] : null,
      color: type === 'bounce'
        ? `hsl(${Math.random()*60+260},80%,70%)`
        : `hsl(${Math.random()*40+280},90%,65%)`,
      type
    });
  }
}

function updateParticles() {
  pCtx.clearRect(0, 0, W, H);
  for (let i = particles.length-1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy;
    p.vy += 0.1; p.life -= p.decay;
    if (p.life <= 0) { particles.splice(i,1); continue; }
    pCtx.globalAlpha = p.life;
    if (p.emoji) {
      pCtx.font = `${p.size*3}px Arial`;
      pCtx.textAlign = 'center';
      pCtx.fillText(p.emoji, p.x, p.y);
    } else {
      pCtx.beginPath();
      pCtx.arc(p.x, p.y, p.size*p.life, 0, Math.PI*2);
      pCtx.fillStyle = p.color;
      pCtx.fill();
    }
  }
  pCtx.globalAlpha = 1;
}

/* ══ INPUT ══ */
let mouse = {x:0,y:0,px:0,py:0};

function isNearBall(x,y) {
  return Math.hypot(x-ball.x, y-ball.y) < ball.radius * 2.5;
}

window.addEventListener('mousedown', e => {
  if (e.button !== 0) return;
  if (isNearBall(e.clientX, e.clientY)) {
    ball.isDragging = true;
    ball.x = e.clientX; ball.y = e.clientY;
    ball.vx = 0; ball.vy = 0;
    cursorEl.classList.add('dragging');
    if (!hintGone) { hintEl.style.opacity = '0'; hintGone = true; }
  }
});
window.addEventListener('mousemove', e => {
  cursorEl.style.left = e.clientX+'px';
  cursorEl.style.top  = e.clientY+'px';
  mouse.px = mouse.x; mouse.py = mouse.y;
  mouse.x = e.clientX; mouse.y = e.clientY;
  if (ball.isDragging) { ball.x = mouse.x; ball.y = mouse.y; }
});
window.addEventListener('mouseup', e => {
  if (e.button !== 0 || !ball.isDragging) return;
  ball.isDragging = false;
  cursorEl.classList.remove('dragging');
  const max = 30;
  ball.vx = Math.max(-max, Math.min(max, mouse.x - mouse.px));
  ball.vy = Math.max(-max, Math.min(max, mouse.y - mouse.py));
});
window.addEventListener('touchstart', e => {
  const t = e.touches[0];
  if (isNearBall(t.clientX, t.clientY)) {
    ball.isDragging = true;
    ball.x = t.clientX; ball.y = t.clientY;
    ball.vx = 0; ball.vy = 0;
    if (!hintGone) { hintEl.style.opacity='0'; hintGone=true; }
  }
  e.preventDefault();
},{passive:false});
window.addEventListener('touchmove', e => {
  const t = e.touches[0];
  mouse.px=mouse.x; mouse.py=mouse.y;
  mouse.x=t.clientX; mouse.y=t.clientY;
  if (ball.isDragging) { ball.x=mouse.x; ball.y=mouse.y; }
  e.preventDefault();
},{passive:false});
window.addEventListener('touchend', e => {
  if (!ball.isDragging) return;
  ball.isDragging = false;
  const max=26;
  ball.vx=Math.max(-max,Math.min(max,mouse.x-mouse.px));
  ball.vy=Math.max(-max,Math.min(max,mouse.y-mouse.py));
  e.preventDefault();
},{passive:false});

/* ══ MAIN LOOP ══ */
let prevTime = 0;

function update(ts) {
  const dt = Math.min((ts - prevTime)/16.67, 3);
  prevTime = ts;

  ctx.clearRect(0,0,W,H);
  drawBackground(ts);

  /* ball physics */
  if (!ball.isDragging) {
    ball.vy += GRAVITY * dt;
    ball.vx *= Math.pow(FRICTION, dt);
    ball.vy *= Math.pow(FRICTION, dt);
    ball.x  += ball.vx * dt;
    ball.y  += ball.vy * dt;
    ball.angle += ball.vx * dt * 0.055;

    if (ball.y + ball.radius > floorY) {
      ball.y = floorY - ball.radius;
      if (Math.abs(ball.vy) > 1.8) {
        spawnParticles(ball.x, floorY, 7, 'bounce');
        addBounce();
      }
      ball.vy *= BOUNCE;
      ball.vx *= 0.85;
    }
    if (ball.x + ball.radius > W) { ball.x = W - ball.radius; ball.vx *= BOUNCE; }
    if (ball.x - ball.radius < 0) { ball.x = ball.radius;     ball.vx *= BOUNCE; }
    if (ball.y - ball.radius < 0) { ball.y = ball.radius;     ball.vy *= BOUNCE; }
  }

    /* cat AI */
  cat.animTimer += dt;
  cat.bounceAnim += dt * 0.08;
  const dx = ball.x - cat.x;
  const dist = Math.abs(dx);

  // 1. Scaliamo il cooldown ad ogni frame
  if (catchCooldown > 0) {
    catchCooldown -= dt;
  }

  // 2. catch: aggiungiamo il controllo sul cooldown (catchCooldown <= 0)
  if (!ball.isDragging && catchCooldown <= 0 && dist < cat.width * 0.65 &&
      Math.abs(ball.y - (cat.y - 36)) < 52) {
      
    catchCooldown = 25; // Imposta una pausa prima che possa toccarla di nuovo
    
    // Ho ridotto le particelle da 18 a 10 per alleggerire ulteriormente
    spawnParticles(ball.x, ball.y, 10, 'catch'); 
    showBubble(CATCH_MSGS[Math.floor(Math.random() * CATCH_MSGS.length)]);
    ball.vx = (Math.random() - 0.5) * 14;
    ball.vy = -(Math.random() * 10 + 7);
    addBounce();
  }

  if (dist > cat.width * 0.4) {
    cat.vx = (dx>0?1:-1) * cat.speed * Math.min(1, dist/100);
    cat.facingRight = dx > 0;
    cat.state = 'run';
  } else {
    cat.vx *= 0.65;
    cat.state = 'idle';
  }

  if (dist < 140 && ball.y < cat.y - 80 && !cat.isJumping) {
    cat.vy = -14;
    cat.isJumping = true;
    cat.state = 'jump';
  }

  cat.vy += GRAVITY * dt;
  cat.x  += cat.vx * dt;
  cat.y  += cat.vy * dt;
  if (cat.y >= floorY) { cat.y = floorY; cat.vy = 0; cat.isJumping = false; }
  cat.x = Math.max(32, Math.min(W-32, cat.x));

  // tail animation
  cat.tailAngle = Math.sin(ts*0.0016)*1.2 + Math.sin(ts*0.0028)*0.4;

  // blink
  cat.blinkTimer -= dt;
  if (cat.blinkTimer <= 0) {
    cat.isBlinking = !cat.isBlinking;
    cat.blinkTimer = cat.isBlinking ? 4 : (Math.random()*200+80);
  }

  drawPipi(cat.x, cat.y, cat.facingRight, cat.state,
           cat.tailAngle, cat.isBlinking, cat.bounceAnim);
  drawBall();
  updateParticles();

  requestAnimationFrame(update);
}

requestAnimationFrame(ts => { prevTime = ts; requestAnimationFrame(update); });
</script>
