<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trasformata di Fourier 🌊</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      padding: 0;
      background: #0f172a;
      color: #e2e8f0;
      font-family: 'Nunito', sans-serif;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    #ui {
      padding: 20px;
      text-align: center;
      background: rgba(30, 41, 59, 0.8);
      backdrop-filter: blur(10px);
      width: 100%;
      box-shadow: 0 4px 15px rgba(0,0,0,0.5);
      z-index: 10;
      border-bottom: 2px solid #38bdf8;
    }
    h1 { margin: 0 0 10px 0; font-size: 2rem; color: #38bdf8; }
    p { margin: 0 0 15px 0; color: #94a3b8; }
    .slider-container {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 15px;
    }
    input[type=range] {
      width: 300px;
      cursor: pointer;
    }
    #n-value {
      font-weight: bold;
      color: #f8fafc;
      font-size: 1.2rem;
      min-width: 30px;
    }
    canvas {
      display: block;
      width: 100vw;
      height: calc(100vh - 120px);
    }
  </style>
</head>
<body>

  <div id="ui">
    <h1>Serie di Fourier Interattiva</h1>
    <p>Come la somma di onde sinusoidali (armoniche) approssima un segnale complesso.</p>
    <div class="slider-container">
      <label for="harmonics">Numero di Armoniche (N):</label>
      <input type="range" id="harmonics" min="1" max="50" value="3">
      <span id="n-value">3</span>
    </div>
  </div>

  <canvas id="fourierCanvas"></canvas>

  <script>
    const canvas = document.getElementById('fourierCanvas');
    const ctx = canvas.getContext('2d');
    const slider = document.getElementById('harmonics');
    const nValue = document.getElementById('n-value');

    let width, height;
    let time = 0;
    let wave = [];

    function resize() {
      width = canvas.width = window.innerWidth;
      height = canvas.height = window.innerHeight - document.getElementById('ui').offsetHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    slider.addEventListener('input', (e) => {
      nValue.innerText = e.target.value;
      wave = []; 
    });

    function draw() {
      ctx.fillStyle = '#0f172a';
      ctx.fillRect(0, 0, width, height);

      let nTerms = parseInt(slider.value);
      const timeStep = 0.03; // Velocità dello scorrimento

      // ==========================================
      // 1. SEZIONE SUPERIORE: Epicicli e Somma
      // ==========================================
      let topY = height * 0.3;
      let x = width * 0.25;
      let y = topY;

      // Disegna il testo della sezione
      ctx.fillStyle = '#94a3b8';
      ctx.font = '16px Nunito';
      ctx.fillText("Composizione tramite epicicli rotanti", 20, 30);

      for (let i = 0; i < nTerms; i++) {
        let prevX = x;
        let prevY = y;
        let n = i * 2 + 1;
        let radius = 100 * (4 / (n * Math.PI));
        
        x += radius * Math.cos(n * time);
        y += radius * Math.sin(n * time);

        // Cerchio
        ctx.strokeStyle = 'rgba(255, 255, 255, 0.2)';
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.arc(prevX, prevY, radius, 0, Math.PI * 2);
        ctx.stroke();

        // Raggio
        ctx.strokeStyle = 'rgba(255, 255, 255, 0.6)';
        ctx.beginPath();
        ctx.moveTo(prevX, prevY);
        ctx.lineTo(x, y);
        ctx.stroke();
      }

      wave.unshift(y - topY); // Salviamo solo l'offset rispetto al centro
      if (wave.length > 1000) wave.pop();

      // Linea di collegamento
      ctx.strokeStyle = 'rgba(56, 189, 248, 0.4)';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(x, y);
      ctx.lineTo(width * 0.5, topY + wave[0]);
      ctx.stroke();

      // Onda tracciata
      ctx.strokeStyle = '#38bdf8';
      ctx.lineWidth = 3;
      ctx.beginPath();
      for (let i = 0; i < wave.length; i++) {
        ctx.lineTo(width * 0.5 + i, topY + wave[i]);
      }
      ctx.stroke();


      // ==========================================
      // 2. SEZIONE INFERIORE: Scomposizione delle onde
      // ==========================================
      let bottomY = height * 0.75;
      
      ctx.fillStyle = '#94a3b8';
      ctx.fillText("Scomposizione delle armoniche (frequenze separate e loro somma)", 20, height * 0.55);

      // Asse centrale
      ctx.strokeStyle = 'rgba(255,255,255,0.1)';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(0, bottomY);
      ctx.lineTo(width, bottomY);
      ctx.stroke();

      // Disegna le singole onde (armoniche)
      for (let i = 0; i < nTerms; i++) {
        let n = i * 2 + 1;
        let amplitude = 100 * (4 / (n * Math.PI));
        
        let hue = (i * 137.5) % 360; 
        let alpha = Math.max(0.15, 0.8 - (i * 0.05)); // Onde più alte sono più trasparenti
        
        ctx.strokeStyle = `hsla(${hue}, 80%, 60%, ${alpha})`;
        ctx.lineWidth = 2;
        ctx.beginPath();

        for(let px = 0; px < width; px++) {
           let timeAtPixel = time + (px - width * 0.5) * timeStep;
           let py = bottomY + amplitude * Math.sin(n * timeAtPixel);

           if (px === 0) ctx.moveTo(px, py);
           else ctx.lineTo(px, py);
        }
        ctx.stroke();
      }

      // Disegna la SOMMA delle onde in bianco in primo piano
      ctx.strokeStyle = 'rgba(255, 255, 255, 0.9)';
      ctx.lineWidth = 3;
      ctx.beginPath();
      for(let px = 0; px < width; px++) {
          let timeAtPixel = time + (px - width * 0.5) * timeStep;
          let sumY = 0;
          for (let i = 0; i < nTerms; i++) {
              let n = i * 2 + 1;
              let amplitude = 100 * (4 / (n * Math.PI));
              sumY += amplitude * Math.sin(n * timeAtPixel);
          }
          if (px === 0) ctx.moveTo(px, bottomY + sumY);
          else ctx.lineTo(px, bottomY + sumY);
      }
      ctx.stroke();

      time -= timeStep;
      requestAnimationFrame(draw);
    }

    draw();
  </script>
</body>
</html>
