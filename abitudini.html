<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Sistema Solare delle Abitudini 🪐</title>
  <style>
    body { margin: 0; padding: 0; background: radial-gradient(circle at center, #1b2735 0%, #090a0f 100%); color: white; font-family: 'Nunito', sans-serif; overflow: hidden; height: 100vh; }
    
    #ui-layer { position: absolute; top: 0; left: 0; width: 100%; padding: 20px; z-index: 100; pointer-events: none; text-align: center; }
    h1 { margin: 0; font-size: 2.5rem; text-shadow: 0 0 15px rgba(255, 204, 0, 0.8); color: #fff; }
    .input-area { margin-top: 20px; pointer-events: auto; }
    input { padding: 12px; border-radius: 20px; border: none; outline: none; font-size: 1rem; width: 250px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
    button { padding: 12px 24px; border-radius: 20px; border: none; background: #f39c12; color: #fff; font-weight: bold; cursor: pointer; margin-left: 10px; transition: 0.3s; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
    button:hover { background: #f1c40f; box-shadow: 0 0 20px #f1c40f; transform: scale(1.05); }

    #space { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; overflow: hidden; }

    /* Il Sole al centro */
    .sun {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      width: 100px; height: 100px; border-radius: 50%;
      background: radial-gradient(circle, #fff 0%, #f1c40f 40%, #e67e22 80%, #d35400 100%);
      box-shadow: 0 0 60px #f39c12, 0 0 120px #e67e22;
      z-index: 50;
    }

    /* Le linee delle orbite */
    .orbit-line { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); border: 1px dashed rgba(255,255,255,0.15); border-radius: 50%; z-index: 1; pointer-events: none; }

    /* Contenitore per posizionare pianeta e testo */
    .planet-wrapper { position: absolute; transform: translate(-50%, -50%); z-index: 60; display: flex; flex-direction: column; align-items: center; cursor: pointer; transition: filter 0.3s; }
    .planet-wrapper:hover { filter: brightness(1.3); z-index: 100; }

    .planet { width: 40px; height: 40px; border-radius: 50%; position: relative; box-shadow: inset -10px -10px 15px rgba(0,0,0,0.6); }
    
    /* Etichetta abitudine */
    .habit-label { margin-top: 10px; background: rgba(0,0,0,0.6); padding: 4px 10px; border-radius: 12px; font-size: 0.85rem; white-space: nowrap; border: 1px solid rgba(255,255,255,0.2); }
    
    /* Cestino */
    .delete-btn { position: absolute; top: -15px; right: -20px; font-size: 1.2rem; opacity: 0; transition: 0.2s; background: rgba(231, 76, 60, 0.8); border-radius: 50%; width: 24px; height: 24px; text-align: center; line-height: 24px; }
    .planet-wrapper:hover .delete-btn { opacity: 1; right: -10px; }

    /* ---- Stili Planetari ---- */
    /* 1. Marte-like */
    .type-1 { background: radial-gradient(circle at 30% 30%, #e74c3c, #c0392b, #641e16); }
    /* 2. Terra-like */
    .type-2 { background: radial-gradient(circle at 30% 30%, #2ecc71 0%, #3498db 60%, #2980b9 100%); }
    /* 3. Saturno-like (con anello via pseudo-elemento) */
    .type-3 { background: radial-gradient(circle at 30% 30%, #f5b041, #d68910); }
    .type-3::before { content: ''; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) rotateX(75deg) rotateY(15deg); width: 70px; height: 70px; border: 8px solid rgba(245, 176, 65, 0.6); border-radius: 50%; box-shadow: 0 0 10px rgba(245, 176, 65, 0.5); pointer-events: none;}
    /* 4. Nettuno-like */
    .type-4 { background: radial-gradient(circle at 30% 30%, #5dade2, #2e86c1, #1b4f72); }
    /* 5. Giove-like (Gassoso) */
    .type-5 { background: repeating-linear-gradient(0deg, #d35400 0%, #e67e22 10%, #f39c12 20%, #d35400 30%); }

    /* Stato completato: Aura e Luna */
    .completed .planet { box-shadow: 0 0 20px #fff, inset -10px -10px 15px rgba(0,0,0,0.4); }
    .completed .habit-label { color: #f1c40f; border-color: #f1c40f; }
    
    .moon { position: absolute; width: 10px; height: 10px; background: #ecf0f1; border-radius: 50%; box-shadow: inset -2px -2px 4px rgba(0,0,0,0.5); animation: orbit-moon 3s linear infinite; display: none; top: 15px; left: 15px;}
    .completed .moon { display: block; }
    
    @keyframes orbit-moon {
      0% { transform: rotate(0deg) translateX(35px) rotate(0deg); }
      100% { transform: rotate(360deg) translateX(35px) rotate(-360deg); }
    }
  </style>
</head>
<body>

  <div id="ui-layer">
    <h1>Costellazione Abitudini</h1>
    <div class="input-area">
      <input type="text" id="habitInput" placeholder="Nuova abitudine...">
      <button onclick="addHabit()">Aggiungi Pianeta</button>
    </div>
  </div>

  <div id="space">
    <div class="sun"></div>
    <div id="orbits-container"></div>
    <div id="planets-container"></div>
  </div>

  <script>
    let habits = JSON.parse(localStorage.getItem('solarHabits')) || [];
    let animationFrame;

    function getTodayStr() { return new Date().toDateString(); }

    function saveHabits() {
      localStorage.setItem('solarHabits', JSON.stringify(habits));
    }

    function addHabit() {
      const input = document.getElementById('habitInput');
      if (!input.value.trim()) return;
      
      habits.push({
        id: Date.now(),
        name: input.value.trim(),
        type: Math.floor(Math.random() * 5) + 1, // Tipo di pianeta da 1 a 5
        angle: Math.random() * Math.PI * 2,      // Posizione iniziale casuale
        speed: (Math.random() * 0.002 + 0.001) * (Math.random() > 0.5 ? 1 : -1), // Velocità orbitale
        lastCompleted: null
      });
      input.value = '';
      saveHabits();
      initSolarSystem();
    }

    function toggleHabit(id) {
      const habit = habits.find(h => h.id === id);
      const today = getTodayStr();
      habit.lastCompleted = (habit.lastCompleted === today) ? null : today;
      saveHabits();
      initSolarSystem();
    }

    function deleteHabit(e, id) {
      e.stopPropagation();
      habits = habits.filter(h => h.id !== id);
      saveHabits();
      initSolarSystem();
    }

    function initSolarSystem() {
      const orbitsCont = document.getElementById('orbits-container');
      const planetsCont = document.getElementById('planets-container');
      orbitsCont.innerHTML = '';
      planetsCont.innerHTML = '';
      const today = getTodayStr();

      habits.forEach((habit, index) => {
        // Calcola il raggio dell'orbita. Più abitudini ci sono, più si allontanano.
        habit.radius = 120 + (index * 60);

        // Crea la linea dell'orbita visiva
        const orbitLine = document.createElement('div');
        orbitLine.className = 'orbit-line';
        orbitLine.style.width = `${habit.radius * 2}px`;
        orbitLine.style.height = `${habit.radius * 2}px`;
        orbitsCont.appendChild(orbitLine);

        // Crea il contenitore del pianeta
        const wrapper = document.createElement('div');
        wrapper.className = `planet-wrapper ${habit.lastCompleted === today ? 'completed' : ''}`;
        wrapper.id = `planet-${habit.id}`;
        wrapper.onclick = () => toggleHabit(habit.id);

        const planet = document.createElement('div');
        planet.className = `planet type-${habit.type}`;
        
        // Aggiunge la luna per lo stato completato
        const moon = document.createElement('div');
        moon.className = 'moon';
        planet.appendChild(moon);

        const delBtn = document.createElement('div');
        delBtn.className = 'delete-btn';
        delBtn.innerHTML = '✖';
        delBtn.onclick = (e) => deleteHabit(e, habit.id);

        const label = document.createElement('div');
        label.className = 'habit-label';
        label.innerText = habit.name;

        wrapper.appendChild(planet);
        wrapper.appendChild(delBtn);
        wrapper.appendChild(label);
        planetsCont.appendChild(wrapper);
      });
    }

    // Loop di animazione per far ruotare i pianeti in tempo reale
    function animateSolarSystem() {
      const cx = window.innerWidth / 2;
      const cy = window.innerHeight / 2;

      habits.forEach(habit => {
        const wrapper = document.getElementById(`planet-${habit.id}`);
        if (wrapper) {
          // Aggiorna l'angolo
          habit.angle += habit.speed;
          
          // Calcola la posizione X e Y usando seno e coseno
          const x = cx + Math.cos(habit.angle) * habit.radius;
          const y = cy + Math.sin(habit.angle) * habit.radius;
          
          // Applica la trasformazione CSS
          wrapper.style.left = `${x}px`;
          wrapper.style.top = `${y}px`;
        }
      });

      animationFrame = requestAnimationFrame(animateSolarSystem);
    }

    // Inizializza tutto
    initSolarSystem();
    if(animationFrame) cancelAnimationFrame(animationFrame);
    animateSolarSystem();

    // Ricalcola il centro se la finestra cambia dimensione
    window.addEventListener('resize', () => {
      // Le posizioni vengono ricalcolate automaticamente nel loop
    });
  </script>
</body>
</html>
